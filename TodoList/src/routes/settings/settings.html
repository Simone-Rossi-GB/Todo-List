<!-- Contenuto Settings -->
<div class="todo-container p-6 elemento-centrato">
    <h1 class="text-3xl font-bold mb-4">Impostazioni</h1>

    <div class="mt-6">
        <div class="card bg-base-100 shadow-xl">
            <div class="card-body">
                <h2 class="card-title">Preferenze Applicazione</h2>

                <div class="form-control mt-4">
                    <label class="label cursor-pointer">
                        <span class="label-text">Tema Scuro</span>
                        <input type="checkbox" class="toggle toggle-primary" />
                    </label>
                </div>

                <div class="form-control">
                    <label class="label cursor-pointer">
                        <span class="label-text">Notifiche</span>
                        <input type="checkbox" class="toggle toggle-primary" checked />
                    </label>
                </div>

                <div class="form-control">
                    <label class="label cursor-pointer">
                        <span class="label-text">Auto-scroll Colonne</span>
                        <input type="checkbox" class="toggle toggle-primary" checked />
                    </label>
                </div>

                <div class="divider"></div>

                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Lingua</span>
                    </label>
                    <select class="select select-bordered">
                        <option>Italiano</option>
                        <option>English</option>
                        <option>Español</option>
                    </select>
                </div>

                <div class="card-actions justify-end mt-6">
                    <button class="btn btn-primary">Salva</button>
                    <button class="btn btn-ghost">Annulla</button>
                </div>
            </div>
        </div>
    </div>
</div>
