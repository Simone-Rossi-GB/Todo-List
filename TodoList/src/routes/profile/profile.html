<!-- Contenuto Profile -->
<div class="todo-container p-6 elemento-centrato">
    <h1 class="text-3xl font-bold mb-4">Profilo Utente</h1>

    <div class="mt-6">
        <div class="flex flex-col items-center gap-4">
            <div class="avatar">
                <div class="w-32 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                    <img id="profile-avatar" src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp" alt="Avatar" />
                </div>
            </div>

            <div class="text-center">
                <h2 class="text-2xl font-semibold">Nome Utente</h2>
                <p class="text-gray-600" id="profile-email">user@example.com</p>
            </div>

            <div class="divider"></div>

            <div class="w-full max-w-md">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Nome</span>
                    </label>
                    <input type="text" placeholder="Nome" class="input input-bordered" id="profile-nome" />
                </div>

                <div class="form-control mt-4">
                    <label class="label">
                        <span class="label-text">Email</span>
                    </label>
                    <input type="email" placeholder="Email" class="input input-bordered" id="profile-email-input" />
                </div>

                <div class="form-control mt-6">
                    <button class="btn btn-primary">Salva Modifiche</button>
                </div>
            </div>
        </div>
    </div>
</div>
