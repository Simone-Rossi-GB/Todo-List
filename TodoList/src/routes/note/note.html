<!-- Contenuto Note Detail -->
<div class="todo-container p-6 elemento-centrato">
    <h1 class="text-3xl font-bold mb-4">Dettaglio Nota</h1>

    <div class="mt-6">
        <!-- Card dettaglio nota -->
        <div class="card bg-base-100 shadow-xl">
            <div class="card-body">
                <h2 id="note-title" class="card-title text-2xl">Titolo Nota</h2>
                <p id="note-description" class="mt-4 whitespace-pre-wrap">Descrizione completa della nota...</p>

                <div class="divider"></div>

                <div class="flex gap-2">
                    <span id="note-status-badge" class="badge badge-primary">Backlog</span>
                </div>

                <div class="card-actions justify-end mt-4">
                    <button id="btn-edit-note" class="btn btn-primary">Modifica</button>
                    <button id="btn-delete-note" class="btn btn-error">Elimina</button>
                    <button id="btn-back" class="btn btn-ghost">Indietro</button>
                </div>
            </div>
        </div>
    </div>
</div>
