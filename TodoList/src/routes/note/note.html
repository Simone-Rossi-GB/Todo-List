<!-- Contenuto Note Detail -->
<div class="todo-container p-6 elemento-centrato">
    <h1 class="text-3xl font-bold mb-4">Dettaglio Nota</h1>

    <div class="mt-6">
        <!-- Card dettaglio nota -->
        <div class="card bg-base-100 shadow-xl">
            <div class="card-body">
                <h2 class="card-title text-2xl">Titolo Nota</h2>
                <p class="mt-4">Descrizione completa della nota...</p>

                <div class="divider"></div>

                <div class="flex gap-2">
                    <span class="badge badge-primary">Backlog</span>
                    <span class="badge badge-ghost">Priority: High</span>
                </div>

                <div class="card-actions justify-end mt-4">
                    <button class="btn btn-primary">Modifica</button>
                    <button class="btn btn-error">Elimina</button>
                    <button class="btn btn-ghost">Indietro</button>
                </div>
            </div>
        </div>
    </div>
</div>
