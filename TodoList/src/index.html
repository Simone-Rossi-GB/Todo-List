<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoList</title>
    <script src="main.js"></script>
    <!-- Tailwind CSS + DaisyUI via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link href = "styles.css" rel="stylesheet">
</head>
<body class="bg-base-200">

    <!-- Menù a tendina -->
    <div class="navbar bg-base-100 shadow-lg navbar-simple-top elemento-centrato">
    <div class="flex-none">
        <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-square btn-ghost">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block h-5 w-5 stroke-current">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </div>
            <ul tabindex="0" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-[1] mt-3 w-52 p-2 shadow">
                <li><a>Home</a></li>
                <li><a>Backlog</a></li>
                <li><a>In Progress</a></li>
                <li><a>Review</a></li>
                <li><a>Done</a></li>
            </ul>
        </div>
    </div>
    
    <div class="flex-1">
        <span class="text-xl font-semibold">TodoList</span>
    </div>
    
    <label class="input bg-base-200" style="width: 25em;">
        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 24">
            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
            </g>
        </svg>
        <input type="search" required placeholder="Search"/>
    </label>
    
    <div class="flex-none ml-4">
        <div class="dropdown dropdown-end">
            <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
                <div class="w-10 rounded-full">
                    <img alt="Avatar" src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp" />
                </div>
            </div>
            <ul tabindex="0" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-[1000] mt-3 w-52 p-2 shadow">
                <li>
                    <a class="justify-between">
                        Profile
                        <span class="badge">New</span>
                    </a>
                </li>
                <li><a>Settings</a></li>
                <li><a>Logout</a></li>
            </ul>
        </div>
    </div>
    </div>

    <div class="todo-container p-3 elemento-centrato" style="min-height: auto">
    <div class="flex space-x-2 items-center">
        <input type="text" placeholder="Aggiungi nuovo todo..." class="input input-bordered flex-1" />
        
        <div class="dropdown dropdown-end">
            <div tabindex="0" role="button" class="btn btn-outline">Stato ▼</div>
            <ul tabindex="0" class="menu dropdown-content bg-base-100 rounded-box z-[1] w-52 p-2 shadow">
                <li><a>Backlog</a></li>
                <li><a>In Progress</a></li>
                <li><a>Review</a></li>
                <li><a>Done</a></li>
            </ul>
        </div>

        <div class="dropdown dropdown-end">
            <button tabindex="0" role="button" class="btn btn-primary">Aggiungi</button>
            <ul tabindex="0"  class="menu dropdown-content bg-base-100 rounded-box z-[1] w-52 p-2 shadow">
                <li><a></a></li>
            </ul>
        </div>

    </div>
</div>


</body>
</html>
